<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ฝึกคิดเลข | Math Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=IBM+Plex+Mono:wght@400;500;600&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f3;
    --bg-card: #ffffff;
    --bg-soft: #f0ebe0;
    --bg-darker: #ebe5d6;
    --ink: #1a1814;
    --ink-soft: #4a463e;
    --ink-mute: #8a8478;
    --line: #d8d2c2;
    --line-soft: #e8e3d4;
    --accent: #c84630;
    --accent-soft: #f5d5cf;
    --green: #5d7a4f;
    --green-soft: #d8e4d2;
    --blue: #3a5a78;
    --blue-soft: #d4dde6;
    --gold: #b8902c;
    --shadow-sm: 0 1px 2px rgba(26, 24, 20, 0.04);
    --shadow: 0 2px 8px rgba(26, 24, 20, 0.06), 0 1px 2px rgba(26, 24, 20, 0.04);
    --shadow-lg: 0 8px 24px rgba(26, 24, 20, 0.08), 0 2px 6px rgba(26, 24, 20, 0.05);
    --radius: 6px;
    --radius-lg: 12px;
    --font-display: "Bricolage Grotesque", system-ui, sans-serif;
    --font-body: "Sarabun", "Bricolage Grotesque", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", "Courier New", monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1814;
      --bg-card: #25221c;
      --bg-soft: #2e2a23;
      --bg-darker: #38332a;
      --ink: #f5f1e6;
      --ink-soft: #c8c2b3;
      --ink-mute: #8a8478;
      --line: #3d3830;
      --line-soft: #2e2a23;
      --accent: #e87560;
      --accent-soft: #4a2a25;
      --green: #8db77a;
      --green-soft: #2a3a23;
      --blue: #6b95b8;
      --blue-soft: #2a3540;
      --gold: #d4a942;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 15% 20%, var(--accent-soft) 0%, transparent 35%),
      radial-gradient(circle at 85% 80%, var(--blue-soft) 0%, transparent 35%);
    background-attachment: fixed;
  }

  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand-mark {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .brand-mark .accent {
    color: var(--accent);
    font-style: italic;
  }

  .brand-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .header-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.05em;
  }

  /* Stats card */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .stat {
    background: var(--bg-card);
    padding: 16px 18px;
  }

  .stat-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .stat-value.mono { font-family: var(--font-mono); font-weight: 500; font-size: 22px; }
  .stat-value.danger { color: var(--accent); }
  .stat-value.success { color: var(--green); }

  /* Controls */
  .controls {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .control-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .control-row + .control-row {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }

  .field {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .field label {
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
  }

  input[type="number"], select, input[type="text"] {
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s;
  }

  input[type="number"] { width: 60px; text-align: center; }
  select { width: 100px; cursor: pointer; }

  input:focus, select:focus {
    outline: none;
    border-color: var(--ink);
    background: var(--bg-card);
  }

  /* Buttons */
  button {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg-card);
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }

  button:hover:not(:disabled) {
    background: var(--bg-soft);
    border-color: var(--ink-mute);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  button:active:not(:disabled) { transform: translateY(0); }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  button.primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  button.primary:hover:not(:disabled) { background: var(--ink-soft); border-color: var(--ink-soft); }

  button.success {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }
  button.success:hover:not(:disabled) { filter: brightness(0.92); }

  button.danger {
    color: var(--accent);
    border-color: var(--accent);
  }
  button.danger:hover:not(:disabled) {
    background: var(--accent);
    color: white;
  }

  button.tiny { font-size: 11px; padding: 4px 10px; }

  /* Toggle switch */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg-soft);
    border-radius: var(--radius);
    margin-top: 12px;
  }

  .toggle {
    position: relative;
    width: 38px;
    height: 22px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--line);
    border-radius: 22px;
    transition: 0.2s;
    cursor: pointer;
  }

  .toggle-slider::before {
    content: "";
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.2s;
    box-shadow: var(--shadow-sm);
  }

  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

  .toggle-label {
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    flex: 1;
  }

  .toggle-hint {
    font-size: 11px;
    color: var(--ink-mute);
    font-family: var(--font-mono);
  }

  /* Problem card */
  .problem {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 36px 24px;
    margin-bottom: 16px;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow-x: auto;
    position: relative;
    box-shadow: var(--shadow);
  }

  .problem-empty {
    color: var(--ink-mute);
    font-size: 14px;
    font-style: italic;
  }

  .problem-numbers {
    font-family: var(--font-mono);
    font-weight: 500;
    line-height: 1.5;
    text-align: right;
    display: inline-block;
  }

  .problem-numbers .row {
    white-space: nowrap;
  }

  .problem-numbers .op-slot {
    display: inline-block;
    width: 1.3em;
    text-align: left;
  }

  .problem-numbers .op-sub { color: var(--accent); }
  .problem-numbers .op-mul { color: var(--blue); }
  .problem-numbers .op-add { color: var(--green); }

  .problem-numbers .divider {
    border-top: 2px solid var(--ink);
    margin-top: 8px;
    padding-top: 8px;
    color: var(--ink-mute);
  }

  .reverse-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 10px;
    padding: 3px 10px;
    background: var(--accent);
    color: white;
    border-radius: 12px;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* Answer */
  .answer-section {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .answer-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #answer {
    flex: 1;
    font-size: 18px;
    font-weight: 500;
    padding: 10px 14px;
  }

  .feedback {
    margin-top: 10px;
    font-size: 13px;
    min-height: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .feedback.success { color: var(--green); font-weight: 500; }
  .feedback.danger { color: var(--accent); font-weight: 500; }
  .feedback.muted { color: var(--ink-mute); }

  .compare-box {
    display: none;
    margin-top: 12px;
    padding: 14px;
    background: var(--bg-soft);
    border-radius: var(--radius);
    border: 1px solid var(--line-soft);
    overflow-x: auto;
  }

  .compare-box.show { display: block; }

  .compare-note {
    font-size: 12px;
    color: var(--blue);
    margin-bottom: 10px;
    padding: 8px 12px;
    background: var(--blue-soft);
    border-radius: var(--radius);
    font-family: var(--font-body);
  }

  .compare-rows {
    font-family: var(--font-mono);
    font-size: 18px;
    line-height: 1.8;
    white-space: nowrap;
  }

  .compare-rows .label {
    display: inline-block;
    width: 80px;
    font-size: 11px;
    color: var(--ink-mute);
    font-family: var(--font-body);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .compare-rows .miss {
    background: var(--accent-soft);
    color: var(--accent);
    padding: 0 3px;
    border-radius: 3px;
    font-weight: 700;
  }

  .compare-rows .hit {
    background: var(--green-soft);
    color: var(--green);
    padding: 0 3px;
    border-radius: 3px;
    font-weight: 700;
  }

  /* History */
  .history {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 16px;
    box-shadow: var(--shadow-sm);
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .history-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
  }

  .history-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .confirm-bar {
    display: none;
    padding: 12px 14px;
    margin-bottom: 12px;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
  }

  .confirm-bar.show { display: block; }

  .confirm-text {
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .confirm-actions {
    display: flex;
    gap: 6px;
  }

  .history-list {
    font-size: 13px;
  }

  .history-empty {
    color: var(--ink-mute);
    font-style: italic;
    text-align: center;
    padding: 16px;
  }

  .history-row {
    padding: 10px 0;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .history-row:last-child { border-bottom: none; }

  .history-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .history-num {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
  }

  .history-stats {
    color: var(--ink-soft);
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .history-acc {
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .acc-high { background: var(--green-soft); color: var(--green); }
  .acc-mid  { background: #f5e8d0; color: var(--gold); }
  .acc-low  { background: var(--accent-soft); color: var(--accent); }

  .mode-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: var(--blue-soft);
    color: var(--blue);
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 10px;
    font-family: var(--font-mono);
    letter-spacing: 0.03em;
  }

  .history-more {
    text-align: center;
    color: var(--ink-mute);
    font-size: 11px;
    padding: 8px 0 0;
    font-style: italic;
  }

  /* Summary */
  .summary {
    text-align: center;
    line-height: 1.8;
  }

  .summary-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 16px 0;
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
  }

  .summary-stat {
    padding: 10px;
    background: var(--bg-soft);
    border-radius: var(--radius);
  }

  .summary-stat .num {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .summary-stat .lbl {
    font-size: 11px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .summary-acc {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    color: var(--green);
    margin-top: 12px;
  }

  /* SR only */
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .container { padding: 16px 12px 40px; }
    .header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .brand-mark { font-size: 26px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-value { font-size: 20px; }
    .problem { padding: 24px 16px; }
    .summary-grid { grid-template-columns: 1fr; max-width: 240px; }
    button { font-size: 13px; padding: 8px 12px; }
  }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .problem, .stats-grid, .controls, .answer-section, .history { animation: fadeIn 0.3s ease-out; }

  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  .pop { animation: pop 0.3s ease-out; }
</style>
</head>
<body>

<div class="container">

  <header class="header">
    <div class="brand">
      <div class="brand-mark">เลข<span class="accent">ฝึก</span></div>
      <div class="brand-tag">v1.0 / mental math trainer</div>
    </div>
    <div class="header-meta" id="dateMeta"></div>
  </header>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat">
      <div class="stat-label">สถานะ</div>
      <div class="stat-value" id="status" style="font-size: 16px;">พร้อมเริ่ม</div>
    </div>
    <div class="stat">
      <div class="stat-label">เวลา</div>
      <div class="stat-value mono" id="timer">00:00</div>
    </div>
    <div class="stat">
      <div class="stat-label">ทำไปแล้ว</div>
      <div class="stat-value" id="count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">ผิด</div>
      <div class="stat-value danger" id="wrong">0</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="control-row">
      <div class="field">
        <label>หลัก</label>
        <input type="number" id="digits" value="10" min="1" max="20" />
      </div>
      <div class="field">
        <label>ทศนิยม</label>
        <input type="number" id="decimals" value="0" min="0" max="10" />
      </div>
      <div class="field">
        <label>โหมด</label>
        <select id="op">
          <option value="sub">ลบ</option>
          <option value="add">บวก</option>
          <option value="mul">คูณ</option>
        </select>
      </div>
      <div style="flex: 1;"></div>
      <button id="startBtn" class="primary">▶ เริ่ม</button>
      <button id="stopBtn" disabled>■ หยุด</button>
    </div>

    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="reverseMode" />
        <span class="toggle-slider"></span>
      </label>
      <div style="flex: 1;">
        <label class="toggle-label" for="reverseMode">โหมดใส่กลับตัวเลข</label>
        <div class="toggle-hint">พิมพ์คำตอบกลับด้านได้ ระบบจะกลับให้ตอนตรวจ</div>
      </div>
    </div>
  </div>

  <!-- Problem -->
  <div class="problem" id="problem">
    <div class="problem-empty">กดปุ่ม "เริ่ม" เพื่อเริ่มฝึก</div>
  </div>

  <!-- Answer -->
  <div class="answer-section" id="answerSection" style="display: none;">
    <div class="answer-row">
      <input type="text" id="answer" placeholder="ใส่คำตอบของคุณ..." autocomplete="off" inputmode="decimal" />
      <button id="submitBtn" class="success">✓ ตรวจ</button>
      <button id="skipBtn">→ ข้าม</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="compare-box" id="compareBox"></div>
  </div>

  <!-- History -->
  <div class="history">
    <div class="history-header">
      <div class="history-title">ประวัติการฝึก</div>
      <div class="history-actions">
        <button id="showAllBtn" class="tiny">รายการทั้งหมด</button>
        <button id="editBtn" class="tiny">แก้ไข</button>
        <button id="clearBtn" class="tiny danger">ลบทั้งหมด</button>
      </div>
    </div>
    <div class="confirm-bar" id="confirmBar">
      <div class="confirm-text" id="confirmText">ยืนยันการลบ?</div>
      <div class="confirm-actions">
        <button id="confirmYes" class="danger tiny">ใช่ ลบ</button>
        <button id="confirmNo" class="tiny">ยกเลิก</button>
      </div>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">ยังไม่มีประวัติ</div>
    </div>
  </div>

</div>

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'math_practice_history_v1';

  let state = {
    running: false,
    startTime: 0,
    timerInterval: null,
    count: 0,
    wrong: 0,
    currentA: null,
    currentB: null,
    currentOp: 'sub',
    history: [],
    showAll: false,
    editMode: false,
    pendingAction: null,
    autoNextTimeout: null,
    reverseMode: false
  };

  const $ = id => document.getElementById(id);

  // ===== Utilities =====

  function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) state.history = JSON.parse(raw);
    } catch(e) {
      state.history = [];
    }
  }

  function saveHistory() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.history));
    } catch(e) {}
  }

  function reverseNumber(numStr) {
    numStr = String(numStr).replace(/,/g, '').trim();
    const neg = numStr.startsWith('-');
    if (neg) numStr = numStr.slice(1);

    const dotIdx = numStr.indexOf('.');
    let digits;
    if (dotIdx === -1) {
      digits = numStr;
    } else {
      digits = numStr.slice(0, dotIdx) + numStr.slice(dotIdx + 1);
    }
    const reversed = digits.split('').reverse().join('');
    let result;
    if (dotIdx === -1) {
      result = reversed;
    } else {
      result = reversed.slice(0, dotIdx) + '.' + reversed.slice(dotIdx);
    }
    return (neg ? '-' : '') + result;
  }

  function randomNum(digits, decimals) {
    let intPart = '';
    intPart += Math.floor(Math.random() * 9) + 1;
    for (let i = 1; i < digits; i++) {
      intPart += Math.floor(Math.random() * 10);
    }
    if (decimals > 0) {
      let decPart = '';
      for (let i = 0; i < decimals; i++) {
        decPart += Math.floor(Math.random() * 10);
      }
      return parseFloat(intPart + '.' + decPart);
    }
    return parseInt(intPart);
  }

  function formatNum(n) {
    return n.toLocaleString('en-US', { maximumFractionDigits: 20 });
  }

  function formatDate() {
    const d = new Date();
    const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
  }

  // ===== Comparison =====

  function buildComparison(userStr, correctStr) {
    function splitNum(s) {
      s = String(s).replace(/,/g, '');
      const neg = s.startsWith('-');
      s = neg ? s.slice(1) : s;
      const idx = s.indexOf('.');
      return {
        neg,
        intPart: idx === -1 ? s : s.slice(0, idx),
        decPart: idx === -1 ? '' : s.slice(idx + 1)
      };
    }
    const u = splitNum(userStr);
    const c = splitNum(correctStr);

    const maxInt = Math.max(u.intPart.length, c.intPart.length);
    const maxDec = Math.max(u.decPart.length, c.decPart.length);

    u.intPart = u.intPart.padStart(maxInt, ' ');
    c.intPart = c.intPart.padStart(maxInt, ' ');
    u.decPart = u.decPart.padEnd(maxDec, ' ');
    c.decPart = c.decPart.padEnd(maxDec, ' ');

    function withCommas(intStr) {
      const trimmed = intStr.replace(/^ +/, '');
      const lead = intStr.slice(0, intStr.length - trimmed.length);
      let result = '';
      let count = 0;
      for (let i = trimmed.length - 1; i >= 0; i--) {
        if (count > 0 && count % 3 === 0) result = ',' + result;
        result = trimmed[i] + result;
        count++;
      }
      return lead + result;
    }

    const uIntCommas = withCommas(u.intPart);
    const cIntCommas = withCommas(c.intPart);
    const uDisplay = (u.neg ? '-' : '') + uIntCommas + (maxDec > 0 ? '.' + u.decPart : '');
    const cDisplay = (c.neg ? '-' : '') + cIntCommas + (maxDec > 0 ? '.' + c.decPart : '');

    const len = Math.max(uDisplay.length, cDisplay.length);
    const userPadded = uDisplay.padStart(len, ' ');
    const correctPadded = cDisplay.padStart(len, ' ');

    let userHtml = '';
    let correctHtml = '';
    for (let i = 0; i < len; i++) {
      const uc = userPadded[i];
      const cc = correctPadded[i];
      const isDigit = /[0-9]/.test(uc) || /[0-9]/.test(cc);
      const same = uc === cc;
      if (isDigit && !same) {
        userHtml += `<span class="miss">${uc === ' ' ? '·' : uc}</span>`;
        correctHtml += `<span class="hit">${cc === ' ' ? '·' : cc}</span>`;
      } else {
        userHtml += uc === ' ' ? '&nbsp;' : uc;
        correctHtml += cc === ' ' ? '&nbsp;' : cc;
      }
    }
    return { userHtml, correctHtml };
  }

  function showCompare(userStr, correctStr, isReverse, originalUserInput) {
    const cmp = buildComparison(userStr, correctStr);
    const reverseInfo = isReverse
      ? `<div class="compare-note">🔄 โหมดกลับตัวเลข: คุณพิมพ์ <strong>${originalUserInput}</strong> → ระบบกลับเป็น <strong>${userStr}</strong></div>`
      : '';

    $('compareBox').innerHTML = `
      ${reverseInfo}
      <div style="font-size: 12px; color: var(--ink-mute); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">เปรียบเทียบหลักที่ผิด</div>
      <div class="compare-rows">
        <div><span class="label">คุณตอบ</span>${cmp.userHtml}</div>
        <div><span class="label">คำตอบ</span>${cmp.correctHtml}</div>
      </div>
      <div style="margin-top: 12px;">
        <button id="nextBtn" class="primary">→ ข้อต่อไป</button>
      </div>
    `;
    $('compareBox').classList.add('show');
    $('nextBtn').addEventListener('click', () => {
      $('compareBox').classList.remove('show');
      newProblem();
    });
  }

  // ===== History rendering =====

  function renderHistory() {
    const container = $('historyList');
    if (state.history.length === 0) {
      container.innerHTML = '<div class="history-empty">ยังไม่มีประวัติ — เริ่มฝึกกันเลย!</div>';
      return;
    }

    const items = state.showAll ? state.history.slice() : state.history.slice(-5);
    const reversed = items.slice().reverse();

    container.innerHTML = '';
    reversed.forEach((h) => {
      const realIndex = state.history.indexOf(h);
      const num = realIndex + 1;
      const acc = h.count > 0 ? Math.round(((h.count - h.wrong) / h.count) * 100) : 0;
      const accClass = acc >= 90 ? 'acc-high' : acc >= 70 ? 'acc-mid' : 'acc-low';
      const modeTag = h.reverseMode ? '<span class="mode-tag">🔄 กลับ</span>' : '';

      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `
        <div class="history-info">
          <span class="history-num">#${num}</span>
          ${modeTag}
          <span class="history-stats">${h.count} ข้อ · ผิด ${h.wrong} · ${h.time} นาที</span>
          <span class="history-acc ${accClass}">${acc}%</span>
        </div>
      `;

      if (state.editMode) {
        const btn = document.createElement('button');
        btn.className = 'tiny danger';
        btn.innerHTML = '🗑 ลบ';
        btn.addEventListener('click', () => deleteHistoryItem(realIndex));
        row.appendChild(btn);
      }
      container.appendChild(row);
    });

    if (!state.showAll && state.history.length > 5) {
      const more = document.createElement('div');
      more.className = 'history-more';
      more.textContent = `แสดง 5 รายการล่าสุด จากทั้งหมด ${state.history.length} รายการ`;
      container.appendChild(more);
    }
  }

  // ===== Confirm dialog =====

  function showConfirm(text, action) {
    state.pendingAction = action;
    $('confirmText').textContent = text;
    $('confirmBar').classList.add('show');
  }

  function hideConfirm() {
    state.pendingAction = null;
    $('confirmBar').classList.remove('show');
  }

  function deleteHistoryItem(index) {
    showConfirm('ลบประวัติครั้งที่ ' + (index + 1) + '?', () => {
      state.history.splice(index, 1);
      saveHistory();
      renderHistory();
    });
  }

  function clearAllHistory() {
    if (state.history.length === 0) return;
    showConfirm('ลบประวัติทั้งหมด ' + state.history.length + ' รายการ?', () => {
      state.history = [];
      saveHistory();
      renderHistory();
    });
  }

  // ===== Problem flow =====

  function buildProblemHtml(a, b, op) {
    const opSymbol = op === 'sub' ? '−' : op === 'mul' ? '×' : '+';
    const opClass = 'op-' + op;

    const aStr = formatNum(a);
    const bStr = formatNum(b);
    const maxLen = Math.max(aStr.length, bStr.length);

    let fontSize = 32;
    if (maxLen > 12) fontSize = 26;
    if (maxLen > 16) fontSize = 22;
    if (maxLen > 22) fontSize = 18;
    if (maxLen > 28) fontSize = 15;

    const reverseBadge = state.reverseMode ? '<div class="reverse-badge">🔄 กลับตัวเลข</div>' : '';

    return `
      ${reverseBadge}
      <div class="problem-numbers" style="font-size: ${fontSize}px;">
        <div class="row"><span class="op-slot">&nbsp;</span>${aStr}</div>
        <div class="row"><span class="op-slot ${opClass}">${opSymbol}</span>${bStr}</div>
        <div class="row divider">?</div>
      </div>
    `;
  }

  function newProblem() {
    if (state.autoNextTimeout) {
      clearTimeout(state.autoNextTimeout);
      state.autoNextTimeout = null;
    }
    $('compareBox').classList.remove('show');
    $('feedback').textContent = '';
    $('feedback').className = 'feedback';

    const digits = parseInt($('digits').value) || 10;
    const decimals = parseInt($('decimals').value) || 0;
    const op = $('op').value;
    state.currentOp = op;
    state.reverseMode = $('reverseMode').checked;

    let a = randomNum(digits, decimals);
    let b = randomNum(digits, decimals);
    if (op === 'sub' && b > a) [a, b] = [b, a];

    state.currentA = a;
    state.currentB = b;

    $('problem').innerHTML = buildProblemHtml(a, b, op);
    $('answerSection').style.display = 'block';
    $('answer').value = '';
    $('answer').focus();
  }

  function checkAnswer() {
    const rawInput = $('answer').value.trim();
    if (!rawInput) {
      $('feedback').textContent = 'กรุณาใส่ตัวเลข';
      $('feedback').className = 'feedback muted';
      return;
    }

    let processedInput = rawInput;
    if (state.reverseMode) {
      processedInput = reverseNumber(rawInput);
    }

    const userAns = parseFloat(processedInput.replace(/,/g, ''));
    if (isNaN(userAns)) {
      $('feedback').textContent = 'กรุณาใส่ตัวเลขที่ถูกต้อง';
      $('feedback').className = 'feedback muted';
      return;
    }

    let correct;
    if (state.currentOp === 'sub') correct = state.currentA - state.currentB;
    else if (state.currentOp === 'mul') correct = state.currentA * state.currentB;
    else correct = state.currentA + state.currentB;

    correct = Math.round(correct * 1e10) / 1e10;
    const userRounded = Math.round(userAns * 1e10) / 1e10;

    state.count++;

    if (userRounded === correct) {
      const reverseNote = state.reverseMode
        ? ` <span style="font-size: 12px; color: var(--ink-mute);">(${rawInput} → ${formatNum(userAns)})</span>`
        : '';
      $('feedback').innerHTML = `✓ ถูกต้อง!${reverseNote}`;
      $('feedback').className = 'feedback success';
      $('count').classList.add('pop');
      setTimeout(() => $('count').classList.remove('pop'), 300);
      state.autoNextTimeout = setTimeout(newProblem, state.reverseMode ? 1100 : 600);
    } else {
      state.wrong++;
      const correctStr = formatNum(correct);
      const userStr = formatNum(userAns);
      const reverseNote = state.reverseMode
        ? ` <span style="font-size: 12px; color: var(--ink-mute);">(พิมพ์: ${rawInput} → กลับ: ${userStr})</span>`
        : '';
      $('feedback').innerHTML = `✗ ผิด · คำตอบที่ถูก: <strong>${correctStr}</strong>${reverseNote} <button id="showCmpBtn" class="tiny">🔍 ดูจุดที่ผิด</button>`;
      $('feedback').className = 'feedback danger';
      $('showCmpBtn').addEventListener('click', () => showCompare(userStr, correctStr, state.reverseMode, rawInput));
    }
    updateStats();
  }

  function skipProblem() {
    state.count++;
    state.wrong++;
    let correct;
    if (state.currentOp === 'sub') correct = state.currentA - state.currentB;
    else if (state.currentOp === 'mul') correct = state.currentA * state.currentB;
    else correct = state.currentA + state.currentB;
    correct = Math.round(correct * 1e10) / 1e10;
    $('feedback').innerHTML = `→ ข้าม · คำตอบ: <strong>${formatNum(correct)}</strong>`;
    $('feedback').className = 'feedback muted';
    updateStats();
    state.autoNextTimeout = setTimeout(newProblem, 1500);
  }

  function updateStats() {
    $('count').textContent = state.count;
    $('wrong').textContent = state.wrong;
  }

  function tick() {
    const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const s = (elapsed % 60).toString().padStart(2, '0');
    $('timer').textContent = `${m}:${s}`;
  }

  function start() {
    state.running = true;
    state.startTime = Date.now();
    state.count = 0;
    state.wrong = 0;
    state.reverseMode = $('reverseMode').checked;
    updateStats();
    state.timerInterval = setInterval(tick, 1000);
    $('startBtn').disabled = true;
    $('stopBtn').disabled = false;
    $('status').textContent = state.reverseMode ? 'กลับตัวเลข' : 'กำลังฝึก';
    $('status').style.color = 'var(--green)';
    newProblem();
  }

  function stop() {
    state.running = false;
    clearInterval(state.timerInterval);
    if (state.autoNextTimeout) clearTimeout(state.autoNextTimeout);

    const elapsed = (Date.now() - state.startTime) / 1000;
    const minutes = (elapsed / 60).toFixed(2);
    const acc = state.count > 0 ? Math.round(((state.count - state.wrong) / state.count) * 100) : 0;

    if (state.count > 0) {
      state.history.push({
        count: state.count,
        wrong: state.wrong,
        time: minutes,
        reverseMode: state.reverseMode,
        date: new Date().toISOString()
      });
      saveHistory();
      renderHistory();
    }

    $('startBtn').disabled = false;
    $('stopBtn').disabled = true;
    $('status').textContent = 'จบเซสชัน';
    $('status').style.color = 'var(--ink)';
    $('answerSection').style.display = 'none';
    $('compareBox').classList.remove('show');

    const modeText = state.reverseMode ? ' (โหมดกลับตัวเลข)' : '';
    $('problem').innerHTML = `
      <div class="summary">
        <div class="summary-title">สรุปผล${modeText}</div>
        <div class="summary-grid">
          <div class="summary-stat">
            <div class="num">${state.count}</div>
            <div class="lbl">ทำได้</div>
          </div>
          <div class="summary-stat">
            <div class="num" style="color: var(--accent);">${state.wrong}</div>
            <div class="lbl">ผิด</div>
          </div>
          <div class="summary-stat">
            <div class="num">${minutes}</div>
            <div class="lbl">นาที</div>
          </div>
        </div>
        <div class="summary-acc">${acc}%</div>
        <div style="font-size: 12px; color: var(--ink-mute); margin-top: 8px;">ความแม่นยำ</div>
      </div>
    `;
  }

  // ===== Event bindings =====

  $('startBtn').addEventListener('click', start);
  $('stopBtn').addEventListener('click', stop);
  $('submitBtn').addEventListener('click', checkAnswer);
  $('skipBtn').addEventListener('click', skipProblem);
  $('clearBtn').addEventListener('click', clearAllHistory);

  $('reverseMode').addEventListener('change', () => {
    if (state.running) {
      state.reverseMode = $('reverseMode').checked;
      $('status').textContent = state.reverseMode ? 'กลับตัวเลข' : 'กำลังฝึก';
      // อัปเดต badge บนข้อปัจจุบัน
      const existingBadge = $('problem').querySelector('.reverse-badge');
      if (existingBadge) existingBadge.remove();
      if (state.reverseMode) {
        $('problem').insertAdjacentHTML('afterbegin', '<div class="reverse-badge">🔄 กลับตัวเลข</div>');
      }
    }
  });

  $('editBtn').addEventListener('click', () => {
    state.editMode = !state.editMode;
    $('editBtn').textContent = state.editMode ? '✓ เสร็จ' : 'แก้ไข';
    renderHistory();
  });

  $('showAllBtn').addEventListener('click', () => {
    state.showAll = !state.showAll;
    $('showAllBtn').textContent = state.showAll ? '5 ล่าสุด' : 'รายการทั้งหมด';
    renderHistory();
  });

  $('confirmYes').addEventListener('click', () => {
    if (state.pendingAction) state.pendingAction();
    hideConfirm();
  });
  $('confirmNo').addEventListener('click', hideConfirm);

  $('answer').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });

  // Init
  $('dateMeta').textContent = formatDate();
  loadHistory();
  renderHistory();

})();
</script>

</body>
</html>
